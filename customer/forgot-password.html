<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Forgot Password — trennen</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    .reset-card { width:min(430px,100%); }
    .reset-intro { color:var(--muted); font-size:14px; line-height:1.6; margin:0 0 20px; text-align:center; }
    .reset-title { font-family:var(--font-brand); font-size:26px; margin:0 0 8px; text-align:center; }
    .reset-footer { display:flex; justify-content:center; margin-top:18px; }
    .reset-footer a { color:var(--sage-dark); font-size:12px; font-weight:600; text-decoration:none; }
    .success-panel {
      display:none;
      padding:18px;
      border:1px solid var(--sage-light);
      border-radius:var(--radius-lg);
      background:rgba(122,158,126,0.08);
      color:var(--ink);
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }
    .success-panel.visible { display:block; }
  </style>
  <script src="../assets/brand.js" defer></script>
  <script src="/assets/csrf.js"></script>
</head>
<body class="admin-body">
  <div class="auth-page">
    <a href="../quote.html?shop=trennen" class="auth-wordmark" id="shopWordmark">—</a>

    <div class="auth-card reset-card fade-up">
      <h1 class="reset-title">Reset your password</h1>
      <p class="reset-intro">Enter the email for your customer account and we’ll send a secure reset link if the account exists.</p>

      <div class="auth-error" id="authError" role="alert" aria-live="assertive"></div>
      <div class="success-panel" id="successPanel" role="status" aria-live="polite"></div>

      <form id="forgotForm" novalidate>
        <div id="shopBanner" style="display:none;margin-bottom:18px;padding:12px 14px;background:rgba(122,158,126,0.08);border:1px solid var(--sage-light);border-radius:var(--radius)">
          <label class="form-label" for="shopSlugInput" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--sage-dark);margin-bottom:6px">Shop ID</label>
          <input class="form-input" type="text" id="shopSlugInput" placeholder="e.g. my-print-shop" autocomplete="organization" style="margin-bottom:0">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <button type="submit" class="btn btn-primary full" id="submitBtn">Send reset link</button>
      </form>

      <div class="reset-footer">
        <a href="login.html" id="backLink">Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let shopSlug = params.get('shop') || '';
    if (!shopSlug) document.getElementById('shopBanner').style.display = 'block';

    function getSlug() {
      return shopSlug || document.getElementById('shopSlugInput').value.trim().toLowerCase();
    }

    function updateLinks() {
      const slug = getSlug();
      document.getElementById('backLink').href = `login.html${slug ? `?shop=${encodeURIComponent(slug)}` : ''}`;
    }

    if (shopSlug) {
      fetch(`/api/customer/shop-info?slug=${encodeURIComponent(shopSlug)}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.name) document.getElementById('shopWordmark').textContent = d.name; })
        .catch(() => {});
    } else {
      document.getElementById('shopWordmark').textContent = 'Customer account';
    }
    updateLinks();
    document.getElementById('shopSlugInput')?.addEventListener('input', updateLinks);

    function showError(message) {
      const el = document.getElementById('authError');
      el.textContent = message;
      el.classList.add('visible');
    }

    function clearError() {
      const el = document.getElementById('authError');
      el.textContent = '';
      el.classList.remove('visible');
    }

    document.getElementById('forgotForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();
      const slug = getSlug();
      const email = document.getElementById('email').value.trim();
      if (!slug) { showError('Please enter your Shop ID.'); return; }
      if (!email) { showError('Please enter your email.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch('/api/customer/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ shopSlug: slug, email }),
        });
        const data = await res.json().catch(() => ({}));
        document.getElementById('forgotForm').style.display = 'none';
        const panel = document.getElementById('successPanel');
        panel.textContent = data.message || "If that email is registered, you'll receive a reset link shortly.";
        panel.classList.add('visible');
      } catch {
        showError('Could not send the reset request. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
