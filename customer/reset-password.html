<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Reset Password — trennen</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    .reset-card { width:min(430px,100%); }
    .reset-title { font-family:var(--font-brand); font-size:26px; margin:0 0 8px; text-align:center; }
    .reset-intro { color:var(--muted); font-size:14px; line-height:1.6; margin:0 0 20px; text-align:center; }
    .reset-footer { display:flex; justify-content:center; margin-top:18px; }
    .reset-footer a { color:var(--sage-dark); font-size:12px; font-weight:600; text-decoration:none; }
    .success-panel {
      display:none;
      padding:18px;
      border:1px solid var(--sage-light);
      border-radius:var(--radius-lg);
      background:rgba(122,158,126,0.08);
      color:var(--ink);
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }
    .success-panel.visible { display:block; }
  </style>
  <script src="../assets/brand.js" defer></script>
  <script src="/assets/csrf.js"></script>
</head>
<body class="admin-body">
  <div class="auth-page">
    <a href="../index.html?shop=trennen" class="auth-wordmark" id="shopWordmark">—</a>

    <div class="auth-card reset-card fade-up">
      <h1 class="reset-title">Choose a new password</h1>
      <p class="reset-intro" id="resetIntro">Checking your reset link...</p>

      <div class="auth-error" id="authError" role="alert" aria-live="assertive"></div>
      <div class="success-panel" id="successPanel" role="status" aria-live="polite"></div>

      <form id="resetForm" novalidate style="display:none">
        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <input class="form-input" type="password" id="newPassword" placeholder="At least 12 characters" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat new password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary full" id="submitBtn">Update password</button>
      </form>

      <div class="reset-footer">
        <a href="login.html" id="loginLink">Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const shopSlug = params.get('shop') || '';

    function loginHref() {
      return `login.html${shopSlug ? `?shop=${encodeURIComponent(shopSlug)}` : ''}`;
    }
    document.getElementById('loginLink').href = loginHref();
    document.getElementById('shopWordmark').href = `../index.html?shop=${encodeURIComponent(shopSlug || 'trennen')}`;

    if (shopSlug) {
      fetch(`/api/customer/shop-info?slug=${encodeURIComponent(shopSlug)}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.name) document.getElementById('shopWordmark').textContent = d.name; })
        .catch(() => {});
    } else {
      document.getElementById('shopWordmark').textContent = 'Customer account';
    }

    function showError(message) {
      const el = document.getElementById('authError');
      el.textContent = message;
      el.classList.add('visible');
    }

    function clearError() {
      const el = document.getElementById('authError');
      el.textContent = '';
      el.classList.remove('visible');
    }

    async function verifyToken() {
      if (!token) {
        document.getElementById('resetIntro').textContent = 'This reset link is missing or invalid.';
        showError('Request a new password reset link.');
        return;
      }
      try {
        const res = await fetch('/api/customer/reset-password/verify?token=' + encodeURIComponent(token));
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.valid) {
          throw new Error(data.error || 'Token expired or invalid');
        }
        document.getElementById('resetIntro').textContent = data.email
          ? `Set a new password for ${data.email}.`
          : 'Set a new password for your account.';
        document.getElementById('resetForm').style.display = '';
      } catch {
        document.getElementById('resetIntro').textContent = 'This reset link has expired or is invalid.';
        showError('Request a new password reset link.');
      }
    }

    document.getElementById('resetForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (newPassword.length < 12) { showError('Password must be at least 12 characters.'); return; }
      if (newPassword !== confirmPassword) { showError('Passwords do not match.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Updating...';
      try {
        const res = await fetch('/api/customer/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Could not update password.');
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('resetIntro').style.display = 'none';
        const panel = document.getElementById('successPanel');
        panel.textContent = 'Your password has been updated. You can now sign in with your new password.';
        panel.classList.add('visible');
        setTimeout(() => { window.location.href = loginHref(); }, 1200);
      } catch (err) {
        showError(err.message || 'Could not update password.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    });

    verifyToken();
  </script>
</body>
</html>
