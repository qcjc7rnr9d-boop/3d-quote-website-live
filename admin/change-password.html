<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Change Password — Trennen Admin</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://sdks.shopifycdn.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com https://checkout.shopify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    .pw-requirements {
      margin-top: 8px;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
    }

    .pw-requirements li {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--muted);
      position: relative;
      padding-left: 14px;
    }

    .pw-requirements li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    .pw-requirements li.met {
      color: var(--sage-dark);
    }

    .pw-requirements li.met::before {
      content: '✓';
      font-size: 10px;
      top: 1px;
    }
  </style>
  <script src="../assets/brand.js" defer></script>
  <script src="/assets/csrf.js"></script>
</head>
<body class="admin-body">

  <div class="auth-page">
    <a href="../index.html" class="auth-wordmark">Trennen</a>

    <div class="auth-card fade-up" role="main">
      <h1 class="auth-title">Change your password</h1>
      <p class="auth-subtitle">You're using a temporary password. Set a new one to continue.</p>

      <div class="auth-error" id="authError" role="alert" aria-live="assertive"></div>

      <form id="changePasswordForm" novalidate aria-label="Change password form">

        <div class="form-group">
          <label class="form-label" for="currentPassword">Current password</label>
          <input
            class="form-input"
            type="password"
            id="currentPassword"
            name="currentPassword"
            placeholder="Current password"
            autocomplete="current-password"
            required
            aria-required="true"
          >
          <div class="form-error" id="currentPasswordError" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <input
            class="form-input"
            type="password"
            id="newPassword"
            name="newPassword"
            placeholder="New password"
            autocomplete="new-password"
            required
            aria-required="true"
            aria-describedby="strengthLabel pwRequirements"
          >
          <!-- Strength meter -->
          <div class="strength-bar" aria-hidden="true">
            <div class="strength-segment" id="s1"></div>
            <div class="strength-segment" id="s2"></div>
            <div class="strength-segment" id="s3"></div>
            <div class="strength-segment" id="s4"></div>
          </div>
          <div class="strength-label" id="strengthLabel" aria-live="polite"></div>
          <!-- Requirements -->
          <ul class="pw-requirements" id="pwRequirements" aria-label="Password requirements">
            <li id="req-length">8+ characters</li>
            <li id="req-upper">Uppercase</li>
            <li id="req-number">Number</li>
            <li id="req-special">Special character</li>
          </ul>
          <div class="form-error" id="newPasswordError" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm new password</label>
          <input
            class="form-input"
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password"
            required
            aria-required="true"
          >
          <div class="form-error" id="confirmPasswordError" role="alert"></div>
        </div>

        <button type="submit" class="btn btn-primary full" style="margin-top:4px;">
          Set new password
        </button>

      </form>
    </div>
  </div>

  <script>
    // ── Password strength checker ──
    function checkStrength(pw) {
      let score = 0;
      const hasLength  = pw.length >= 8;
      const hasUpper   = /[A-Z]/.test(pw);
      const hasNumber  = /[0-9]/.test(pw);
      const hasSpecial = /[^A-Za-z0-9]/.test(pw);

      if (hasLength)  score++;
      if (hasUpper)   score++;
      if (hasNumber)  score++;
      if (hasSpecial) score++;

      // Update requirement indicators
      document.getElementById('req-length').classList.toggle('met', hasLength);
      document.getElementById('req-upper').classList.toggle('met', hasUpper);
      document.getElementById('req-number').classList.toggle('met', hasNumber);
      document.getElementById('req-special').classList.toggle('met', hasSpecial);

      const segs   = ['s1', 's2', 's3', 's4'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const cls    = ['', 'weak', 'fair', 'good', 'strong'];

      segs.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'strength-segment' + (i < score ? ' ' + cls[score] : '');
      });

      document.getElementById('strengthLabel').textContent = labels[score] || '';
      return score;
    }

    document.getElementById('newPassword').addEventListener('input', e => checkStrength(e.target.value));

    // ── Form submit ──
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous errors
      ['authError', 'currentPasswordError', 'newPasswordError', 'confirmPasswordError'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '';
        el.classList.remove('visible');
      });

      const currentPw = document.getElementById('currentPassword').value;
      const newPw     = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;

      // Client-side validation
      let valid = true;

      if (!currentPw) {
        document.getElementById('currentPasswordError').textContent = 'Please enter your current password.';
        valid = false;
      }

      const strength = checkStrength(newPw);
      if (strength < 3) {
        document.getElementById('newPasswordError').textContent = 'Password is too weak. Aim for at least "Good".';
        valid = false;
      }

      if (newPw !== confirmPw) {
        document.getElementById('confirmPasswordError').textContent = 'Passwords do not match.';
        valid = false;
      }

      if (!valid) return;

      const btn = e.target.querySelector('[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword: currentPw, newPassword: newPw }),
        });
        const data = await res.json();

        if (data.ok) {
          window.location.href = 'dashboard.html';
        } else {
          const errEl = document.getElementById('authError');
          errEl.textContent = data.error || 'Could not update password. Please try again.';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Set new password';
        }
      } catch {
        const errEl = document.getElementById('authError');
        errEl.textContent = 'Network error. Please check your connection and try again.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
