<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In — Trennen Admin</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://sdks.shopifycdn.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com https://checkout.shopify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    /* ── Success banner (shown when ?message=password-updated) ── */
    .success-banner {
      display: none;
      background: #EEF4EF;
      border: 1px solid var(--sage-light);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--sage-dark);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .success-banner.visible {
      display: block;
    }
  </style>
  <script src="../assets/brand.js" defer></script>
</head>
<body class="admin-body">

  <div class="auth-page">
    <a href="../index.html" class="auth-wordmark">Trennen</a>

    <div class="auth-card fade-up" role="main">

      <!-- Success banner (password reset) -->
      <div class="success-banner" id="successBanner" role="status" aria-live="polite">
        Password updated. Please sign in.
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your print shop dashboard</p>

      <div class="auth-error" id="authError" role="alert" aria-live="assertive">
        Incorrect email or password
      </div>

      <form id="loginForm" novalidate aria-label="Sign in form">

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            required
            aria-required="true"
          >
        </div>

        <button type="button" class="btn btn-primary full" style="margin-top:8px;" onclick="doLogin()">
          Sign in
        </button>

      </form>

      <div class="auth-footer">
        <a href="forgot-password.html">Forgot your password?</a>
      </div>

    </div>
  </div>

  <script>
    // ── Show success banner if redirected after password reset ──
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('message') === 'password-updated') {
      document.getElementById('successBanner').classList.add('visible');
      // Clean up the URL without reloading
      const cleanUrl = window.location.pathname;
      window.history.replaceState({}, '', cleanUrl);
    }

    // ── Login form ──
    async function doLogin() {
      const btn = document.querySelector('[onclick="doLogin()"]');
      const errEl = document.getElementById('authError');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (data.ok) {
          if (data.is_temp_password) {
            window.location.href = 'change-password.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch (err) {
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
