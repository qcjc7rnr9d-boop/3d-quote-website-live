<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Connecting Stripe — mahi3d</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://js.stripe.com https://sdks.shopifycdn.com; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com https://checkout.shopify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    .callback-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--off-white);
      padding: 24px;
    }

    .callback-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 56px 40px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.35s ease both;
    }

    /* ── Loading spinner ── */
    .spinner-wrap {
      margin: 0 auto 28px;
      width: 56px;
      height: 56px;
    }

    .spinner-ring {
      animation: spin 1.1s linear infinite;
      transform-origin: center;
    }

    .spinner-track {
      stroke: var(--stone);
    }

    .spinner-arc {
      stroke: var(--sage);
      stroke-linecap: round;
      animation: pulse-arc 1.1s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pulse-arc {
      0%, 100% { stroke-dashoffset: 100; }
      50%       { stroke-dashoffset: 30; }
    }

    /* ── Icon circles ── */
    .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-circle.success {
      background: var(--sage);
      color: var(--white);
    }

    .icon-circle.error {
      background: #FEE2E2;
      color: #DC2626;
    }

    /* ── Typography ── */
    .callback-heading {
      font-family: var(--font-brand);
      font-size: 26px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .callback-body {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 0;
    }

    .callback-body + .callback-body {
      margin-top: 6px;
    }

    .callback-link {
      display: inline-block;
      margin-top: 20px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--sage-dark);
      text-decoration: none;
    }

    .callback-link:hover {
      text-decoration: underline;
    }

    /* ── Redirect bar ── */
    .redirect-bar {
      margin-top: 20px;
      height: 3px;
      background: var(--stone);
      border-radius: 2px;
      overflow: hidden;
    }

    .redirect-fill {
      height: 100%;
      background: var(--sage);
      border-radius: 2px;
      animation: fillBar 2s linear forwards;
    }

    @keyframes fillBar {
      from { width: 0%; }
      to   { width: 100%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .state { display: none; }
    .state.active { display: block; }
  </style>
</head>
<body>

  <div class="callback-page" role="main">
    <div class="callback-card">

      <!-- Loading state -->
      <div class="state active" id="stateLoading" aria-live="polite" aria-label="Connecting Stripe account">
        <div class="spinner-wrap" aria-hidden="true">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle class="spinner-track" cx="28" cy="28" r="22" stroke-width="3" fill="none"/>
            <g class="spinner-ring">
              <circle
                class="spinner-arc"
                cx="28" cy="28" r="22"
                stroke-width="3"
                fill="none"
                stroke-dasharray="138"
                stroke-dashoffset="60"
              />
            </g>
          </svg>
        </div>
        <h1 class="callback-heading">Connecting your Stripe account…</h1>
        <p class="callback-body">Please wait while we complete the connection.</p>
      </div>

      <!-- Success state -->
      <div class="state" id="stateSuccess" aria-live="polite">
        <div class="icon-circle success" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h1 class="callback-heading">Stripe connected!</h1>
        <p class="callback-body">Your account is linked. Redirecting to pricing setup…</p>
        <div class="redirect-bar" aria-hidden="true">
          <div class="redirect-fill" id="redirectFill"></div>
        </div>
      </div>

      <!-- Error state -->
      <div class="state" id="stateError" aria-live="assertive">
        <div class="icon-circle error" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h1 class="callback-heading">Connection failed</h1>
        <p class="callback-body" id="errorMessage">An unexpected error occurred.</p>
        <a href="onboarding.html" class="callback-link">← Back to onboarding</a>
      </div>

    </div>
  </div>

  <script>
    function showState(id) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showError(msg) {
      document.getElementById('errorMessage').textContent = msg || 'An unexpected error occurred.';
      showState('stateError');
    }

    function showSuccess() {
      showState('stateSuccess');
      // Trigger the redirect bar animation then navigate
      setTimeout(() => {
        window.location.href = 'onboarding.html?step=2';
      }, 2000);
    }

    // ── Main logic ──
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error');

    if (error) {
      showError(params.get('error_description') || 'Connection was denied.');
    } else if (code) {
      fetch('/api/stripe/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            showSuccess();
          } else {
            showError(data.error || 'Connection failed. Please try again.');
          }
        })
        .catch(() => showError('Network error. Please try again.'));
    } else {
      showError('No authorisation code received.');
    }
  </script>
</body>
</html>
