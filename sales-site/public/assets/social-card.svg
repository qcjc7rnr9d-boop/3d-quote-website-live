<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trennen - 3D print quoting software</title>
  <desc id="desc">A branded Trennen social preview showing a clear quote flow from upload to pricing to approval.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0C0A"/>
      <stop offset="0.58" stop-color="#151912"/>
      <stop offset="1" stop-color="#213027"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFAF0"/>
      <stop offset="1" stop-color="#F0E5D5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="111" cy="56" r="190" fill="#54B98D" opacity="0.11"/>
  <circle cx="1040" cy="158" r="220" fill="#D7A257" opacity="0.08"/>
  <path d="M76 96h150v20H76z" fill="#F7F1E7"/>
  <text x="76" y="184" fill="#A7DEC8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" letter-spacing="2">3D PRINT QUOTING SOFTWARE</text>
  <text x="76" y="271" fill="#F7F1E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="70" font-weight="850">Customer-ready</text>
  <text x="76" y="346" fill="#F7F1E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="70" font-weight="850">quotes from STL</text>
  <text x="76" y="421" fill="#F7F1E7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="70" font-weight="850">requests.</text>
  <text x="78" y="482" fill="#D8D0C4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="500">Collect files, price jobs, and send one clear next step.</text>

  <g filter="url(#shadow)">
    <rect x="682" y="116" width="416" height="374" rx="12" fill="url(#paper)" stroke="#FFFFFF" stroke-opacity="0.34"/>
    <rect x="682" y="116" width="416" height="54" rx="12" fill="#EFE4D5"/>
    <text x="710" y="151" fill="#22251E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="800">Trennen quote flow</text>
    <g transform="translate(718 205)">
      <rect width="118" height="72" rx="10" fill="#E8F3EC" stroke="#BBDDCB"/>
      <text x="18" y="31" fill="#1E7658" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="850">Upload</text>
      <text x="18" y="53" fill="#5E675F" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">STL files</text>
    </g>
    <path d="M850 241h58" stroke="#54B98D" stroke-width="4" stroke-linecap="round"/>
    <g transform="translate(922 205)">
      <rect width="118" height="72" rx="10" fill="#FFF8EC" stroke="#E3C68F"/>
      <text x="18" y="31" fill="#7C5A22" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="850">Price</text>
      <text x="18" y="53" fill="#5E675F" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">Shop rules</text>
    </g>
    <path d="M780 315h220" stroke="#D8D0C4" stroke-width="2"/>
    <rect x="732" y="336" width="318" height="92" rx="12" fill="#FFFFFF" fill-opacity="0.72" stroke="#D8D0C4"/>
    <text x="758" y="371" fill="#1E7658" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="850" letter-spacing="1.4">QUOTE READY</text>
    <text x="758" y="407" fill="#171915" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="850">NZ$84.00</text>
  </g>
  <rect x="76" y="532" width="204" height="50" rx="25" fill="#54B98D"/>
  <text x="114" y="565" fill="#07100C" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="850">Start free</text>
</svg>
