<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Set New Password — Trennen Platform</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
</head>
<body class="admin-body">
  <div class="auth-page">
    <span class="auth-wordmark">Trennen</span>
    <div class="auth-card fade-up" role="main">
      <div id="loadingState" style="text-align:center">
        <p class="auth-subtitle">Validating reset link…</p>
      </div>
      <div id="errorState" style="display:none;text-align:center">
        <h1 class="auth-title">Link expired</h1>
        <p class="auth-subtitle">Please request a new platform reset link.</p>
        <a href="/platform/forgot-password.html" class="btn btn-primary" style="display:inline-flex">Request new link</a>
      </div>
      <div id="formState" style="display:none">
        <h1 class="auth-title">Set platform password</h1>
        <p class="auth-subtitle">Choose a strong password for the owner portal.</p>
        <div class="auth-error" id="authError" role="alert" aria-live="assertive"></div>
        <form id="resetForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="newPassword">New password</label>
            <input class="form-input" type="password" id="newPassword" autocomplete="new-password" required>
            <div class="form-error" id="passwordError"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm password</label>
            <input class="form-input" type="password" id="confirmPassword" autocomplete="new-password" required>
            <div class="form-error" id="confirmError"></div>
          </div>
          <button type="submit" class="btn btn-primary full">Set new password</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    function show(id) {
      ['loadingState', 'errorState', 'formState'].forEach(key => {
        document.getElementById(key).style.display = key === id ? 'block' : 'none';
      });
    }
    function validPassword(pw) {
      return pw.length >= 8 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
    }
    async function verify() {
      if (!token) return show('errorState');
      try {
        const r = await fetch('/api/platform/reset-password/verify?token=' + encodeURIComponent(token));
        if (r.ok) return show('formState');
      } catch {}
      show('errorState');
    }
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      document.getElementById('passwordError').textContent = '';
      document.getElementById('confirmError').textContent = '';
      document.getElementById('authError').classList.remove('visible');
      if (!validPassword(pw)) {
        document.getElementById('passwordError').textContent = 'Use 8+ characters with uppercase, number, and special character.';
        return;
      }
      if (pw !== confirm) {
        document.getElementById('confirmError').textContent = 'Passwords do not match.';
        return;
      }
      const btn = e.target.querySelector('[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Setting password…';
      try {
        const r = await fetch('/api/platform/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Could not reset password.');
        window.location.href = '/platform/login.html';
      } catch (err) {
        const errEl = document.getElementById('authError');
        errEl.textContent = err.message || 'Could not reset password.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });
    verify();
  </script>
</body>
</html>
