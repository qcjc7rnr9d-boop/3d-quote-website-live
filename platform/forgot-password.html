<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Forgot Password — Trennen Platform</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
</head>
<body class="admin-body">
  <div class="auth-page">
    <span class="auth-wordmark">Trennen</span>
    <div class="auth-card fade-up" role="main">
      <div id="formState">
        <div style="text-align:center;margin-bottom:24px">
          <span style="font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage-dark);background:rgba(122,158,126,0.12);border:1px solid var(--sage-light);border-radius:var(--radius);padding:3px 12px">Platform Admin</span>
        </div>
        <h1 class="auth-title">Reset platform password</h1>
        <p class="auth-subtitle">Send a reset link to the saved platform owner email.</p>
        <button type="button" class="btn btn-primary full" id="sendResetBtn">Send reset link</button>
        <div class="auth-footer" style="margin-top:20px;text-align:center">
          <a href="/platform/login.html">Back to sign in</a>
        </div>
      </div>
      <div id="sentState" style="display:none;text-align:center" aria-live="polite">
        <h1 class="auth-title">Check your email</h1>
        <p class="auth-subtitle">If the owner email is configured, a reset link will be sent shortly.</p>
        <div class="auth-footer" style="margin-top:20px">
          <a href="/platform/login.html">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('sendResetBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendResetBtn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        await fetch('/api/platform/forgot-password', { method: 'POST' });
      } catch {}
      document.getElementById('formState').style.display = 'none';
      document.getElementById('sentState').style.display = 'block';
    });
  </script>
</body>
</html>
