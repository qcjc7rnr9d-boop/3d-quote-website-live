<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Platform Admin — Trennen</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="../assets/admin.css">
  <script src="/assets/csrf.js"></script>
</head>
<body class="admin-body">

  <div class="auth-page">
    <span class="auth-wordmark">Trennen</span>

    <div class="auth-card fade-up" role="main">
      <div style="text-align:center;margin-bottom:24px">
        <span style="font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage-dark);background:rgba(122,158,126,0.12);border:1px solid var(--sage-light);border-radius:var(--radius);padding:3px 12px">
          Platform Admin
        </span>
      </div>

      <h1 class="auth-title">Platform access</h1>
      <p class="auth-subtitle">Private Trennen operator portal</p>

      <div class="auth-error" id="authError" role="alert" aria-live="assertive">
        Incorrect email or password
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Owner email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="Platform admin password"
            autocomplete="current-password"
            required
          >
        </div>
        <div class="form-group" id="mfaGroup" style="display:none">
          <label class="form-label" for="mfaCode">Authenticator code</label>
          <input
            class="form-input"
            type="text"
            id="mfaCode"
            placeholder="6-digit code"
            inputmode="numeric"
            autocomplete="one-time-code"
          >
        </div>

        <button type="button" class="btn btn-primary full" style="margin-top:8px" onclick="doLogin()">
          Sign in
        </button>
      </form>

      <div class="auth-footer" style="margin-top:20px;text-align:center">
        <a href="/platform/forgot-password.html" style="font-size:12px;color:var(--muted)">Forgot password?</a>
        <span style="font-size:12px;color:var(--border);margin:0 8px">·</span>
        <a href="/admin/login.html" style="font-size:12px;color:var(--muted)">Shop admin login</a>
      </div>
    </div>
  </div>

  <script>
    // Already logged in? Go straight to admin
    (async () => {
      try {
        const r = await fetch('/api/platform/me');
        if (r.ok) window.location.href = '/platform/admin.html';
      } catch {}
    })();

    async function doLogin() {
      const btn = document.querySelector('[onclick="doLogin()"]');
      const errEl = document.getElementById('authError');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('visible');

      try {
        const r = await fetch('/api/platform/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            mfaCode: document.getElementById('mfaCode').value
          })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = '/platform/admin.html';
        } else {
          if (data.mfa_required) document.getElementById('mfaGroup').style.display = '';
          errEl.textContent = data.error || 'Incorrect email or password';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
