<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — mahi3d</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/shared.css">
  <style>
    /* ── Page layout ─────────────────────────────────────── */
    .page-main {
      max-width: 560px;
      margin: 0 auto;
      padding: 100px 24px 60px;
      text-align: center;
    }

    /* ── Checkmark circle ────────────────────────────────── */
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(122, 158, 126, 0.10);
      border: 1.5px solid var(--sage-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    /* ── Heading ─────────────────────────────────────────── */
    .confirm-heading {
      font-size: 40px;
      font-weight: 400;
      margin-bottom: 0;
      line-height: 1.1;
    }

    /* ── Order ref badge ─────────────────────────────────── */
    .order-ref-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: var(--radius);
      padding: 5px 16px;
      color: var(--sage-dark);
      background: rgba(122, 158, 126, 0.12);
      border: 1px solid var(--sage-light);
      margin: 16px auto 0;
    }

    /* ── Summary card ────────────────────────────────────── */
    .summary-card {
      text-align: left;
      margin-top: 28px;
      animation: fadeUp 300ms ease-out;
    }

    .summary-card-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }

    /* ── Detail rows ─────────────────────────────────────── */
    .detail-rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detail-value {
      font-size: 14px;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      flex-shrink: 0;
    }

    /* ── Dispatch row ────────────────────────────────────── */
    .dispatch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .dispatch-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Info text ───────────────────────────────────────── */
    .info-text {
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      margin-top: 20px;
    }

    /* ── Trust strip ─────────────────────────────────────── */
    .trust-strip {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .page-main {
        padding: 88px 16px 48px;
      }

      .confirm-heading {
        font-size: 32px;
      }
    }
  </style>
  <script src="assets/brand.js" defer></script>
  <script src="/assets/csrf.js"></script>
</head>
<body>

  <nav class="nav" role="navigation">
    <a href="index.html?shop=mahi3d" class="nav-wordmark" data-home-link>mahi3d</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="materials.html">Materials</a></li>
      <li><a href="index.html?shop=mahi3d#uploadZone" data-start-link>Quote</a></li>
      <li><a href="customer/dashboard.html#help">Contact</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="2" y="5" width="18" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="10.25" width="18" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="15.5" width="18" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>
  </nav>

  <main class="page-main fade-in">

    <!-- 1. Checkmark circle -->
    <div class="check-circle">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 16l7 7 14-14" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- 2. Overline -->
    <p class="overline" style="margin-bottom:12px;">3D Print On Demand</p>

    <!-- 3. Heading -->
    <h2 class="confirm-heading">Order Confirmed</h2>

    <!-- 4. Order ref badge -->
    <div class="order-ref-badge" id="orderRef">—</div>

    <!-- 5. Summary card -->
    <div class="card summary-card">
      <span class="summary-card-label">What you ordered</span>

      <div class="detail-rows" id="summaryRows">
        <div class="detail-row">
          <span class="detail-label">Material</span>
          <span class="detail-value" id="sumMaterial">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Colour</span>
          <span class="detail-value">
            <span class="color-swatch" id="sumColorSwatch"></span>
            <span id="sumColorName">—</span>
          </span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Finish</span>
          <span class="detail-value" id="sumFinish">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Quantity</span>
          <span class="detail-value" id="sumQty">—</span>
        </div>
      </div>

      <hr class="divider">

      <div class="dispatch-row">
        <span class="dispatch-label">Order status</span>
        <span class="badge badge-stone" id="sumStatus">Received</span>
      </div>
    </div>

    <!-- 6. Info text -->
    <p class="info-text">A confirmation email will be sent to your inbox.</p>

    <!-- 7. CTA -->
    <a href="index.html?shop=mahi3d" class="btn btn-outline" style="margin-top:20px; display:inline-flex;" data-home-link>Back to home</a>

    <!-- 8. Trust strip -->
    <div class="trust-strip">
      <span class="chip">Secure checkout</span>
      <span class="chip">Order saved</span>
      <span class="chip">Portal tracking</span>
    </div>

  </main>

  <script>
    // ── Nav toggle ──────────────────────────────────────────
    const nt = document.getElementById('navToggle');
    const nl = document.getElementById('navLinks');
    if (nt) nt.addEventListener('click', () => {
      const o = nl.classList.toggle('open');
      nt.setAttribute('aria-expanded', o);
    });

    // ── Fetch the real order from the backend ──────────────
    // The checkout flow redirects here with ?order=<id> after a successful
    // Stripe charge. We pull the public order details and render them.
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order');
    const orderToken = params.get('token');
    const shopSlug = params.get('shop') || 'mahi3d';
    const orderRefEl = document.getElementById('orderRef');
    document.querySelectorAll('a[href="materials.html"]').forEach(a => { a.href = `catalog.html?shop=${encodeURIComponent(shopSlug)}`; });
    document.querySelectorAll('a[data-home-link]').forEach(a => { a.href = `index.html?shop=${encodeURIComponent(shopSlug)}`; });
    document.querySelectorAll('a[data-start-link], a[href="quote.html"]').forEach(a => { a.href = `index.html?shop=${encodeURIComponent(shopSlug)}#uploadZone`; });
    document.querySelectorAll('a[href="customer/dashboard.html#help"]').forEach(a => { a.href = `customer/dashboard.html?shop=${encodeURIComponent(shopSlug)}#help`; });

    if (!orderId || !orderToken) {
      orderRefEl.textContent = 'No order found';
    } else {
      orderRefEl.textContent = 'Loading…';
      fetch('/api/orders/public/' + encodeURIComponent(orderId) + '?token=' + encodeURIComponent(orderToken))
        .then(r => r.ok ? r.json() : Promise.reject(r))
        .then(o => {
          // Big "ORD-XXXX" badge
          orderRefEl.textContent = 'ORD-' + String(o.id).padStart(4, '0');

          // Summary
          document.getElementById('sumMaterial').textContent = o.material_name || '—';
          document.getElementById('sumColorName').textContent = o.colour || '—';
          document.getElementById('sumFinish').textContent = o.finish || '—';
          document.getElementById('sumQty').textContent = String(o.quantity || 1);
          document.getElementById('sumStatus').textContent = o.fulfilment_status || 'Received';
        })
        .catch(() => {
          orderRefEl.textContent = 'Order not found';
        });
    }

    // Clean up any stale localStorage from earlier flows so the next
    // quote starts fresh (file metadata + cart snapshot).
    try { localStorage.removeItem('cart'); } catch {}
  </script>

</body>
</html>
